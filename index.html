<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ma Boîte Mail</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;background:#FFF6F1;height:100vh;overflow:hidden;font-size:13px}
.app{display:flex;height:100vh}

/* SIDEBAR */
.sb{width:260px;min-width:160px;max-width:460px;background:#fff;display:flex;flex-direction:column;border-right:1px solid #EBEBEB;flex-shrink:0;position:relative}
.resize-handle{position:absolute;right:-4px;top:0;bottom:0;width:8px;cursor:col-resize;z-index:10;display:flex;align-items:center;justify-content:center}
.resize-handle:hover .resize-bar,.resize-handle.dragging .resize-bar{background:#E8593C}
.resize-bar{width:3px;height:48px;border-radius:3px;background:#DDDCDC;transition:background .15s}
.sb-top{padding:14px 12px 8px}
.sb-title{font-size:16px;font-weight:700;color:#1A1612;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}
.nbtn{background:#E8593C;color:#fff;border:none;border-radius:8px;padding:5px 11px;font-size:11px;font-weight:600;cursor:pointer}
.srch-wrap{position:relative;margin-bottom:4px}
.srch{width:100%;padding:7px 10px 7px 30px;border-radius:8px;border:1px solid #EBEBEB;background:#FFF6F1;font-size:12px;outline:none;color:#1A1612}
.srch-icon{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:#ABABAB;font-size:13px;pointer-events:none}
.srch-clear{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;color:#ABABAB;cursor:pointer;font-size:14px;display:none}

/* FOLDERS */
.folders{padding:6px 8px;border-bottom:1px solid #EBEBEB}
.folder{display:flex;align-items:center;gap:7px;padding:5px 8px;border-radius:7px;cursor:pointer;font-size:12px;color:#444;font-weight:500}
.folder:hover{background:#F5F4F0}
.folder.on{background:#FDEAE3;color:#E8593C;font-weight:600}
.folder-icon{font-size:14px;width:16px;text-align:center}
.folder-count{margin-left:auto;font-size:10px;background:#E8593C;color:#fff;border-radius:10px;padding:1px 6px;min-width:18px;text-align:center}

/* LABELS */
.labels-section{padding:6px 8px;border-bottom:1px solid #EBEBEB}
.labels-title{font-size:10px;color:#ABABAB;font-weight:600;text-transform:uppercase;letter-spacing:.5px;padding:4px 8px;display:flex;justify-content:space-between;align-items:center}
.label-add{background:none;border:none;color:#E8593C;cursor:pointer;font-size:16px;line-height:1}
.label-item{display:flex;align-items:center;gap:7px;padding:4px 8px;border-radius:7px;cursor:pointer;font-size:12px;color:#444}
.label-item:hover{background:#F5F4F0}
.label-item.on{background:#F5F4F0;font-weight:600}
.label-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.label-count{margin-left:auto;font-size:10px;color:#ABABAB}

/* THREAD LIST */
.tlist{flex:1;overflow-y:auto}
.ti{display:flex;gap:8px;padding:9px 12px;cursor:pointer;border-left:3px solid transparent;transition:background .1s;align-items:flex-start}
.ti:hover{background:#F5F4F0}
.ti.on{background:#FDEAE3;border-left-color:#E8593C}
.ti.unread{background:#FDEAE3;border-left-color:#F0C4B5}
.ti.unread.on{background:#FDEAE3;border-left-color:#E8593C}
.ti.checked{background:#FFF3E0}
.ti-check{width:16px;height:16px;border-radius:5px;border:1.5px solid #D5D3D3;flex-shrink:0;margin-top:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;background:#fff}
.ti-check.checked{background:#E8593C;border-color:#E8593C}
.bulk-bar{display:none;align-items:center;gap:10px;padding:8px 14px;background:#1A1612;color:#fff;font-size:12px}
.bulk-bar.vis{display:flex}
.bulk-btn{background:#E05C5C;color:#fff;border:none;border-radius:7px;padding:5px 12px;font-size:11px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:5px}
.bulk-cancel{background:none;border:none;color:#ABABAB;font-size:11px;cursor:pointer;margin-left:auto}
.av{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0}
.ti-info{flex:1;min-width:0}
.ti-name{font-size:12px;font-weight:500;color:#1A1612;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ti-name.u{font-weight:700;color:#3730A3}
.ti-subj{font-size:11px;color:#8A8A8E;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ti-subj.u{color:#E8593C;font-weight:600}
.ti-snip{font-size:10px;color:#ABABAB;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
.ti-meta{display:flex;flex-direction:column;align-items:flex-end;gap:3px;flex-shrink:0}
.ti-time{font-size:10px;color:#ABABAB}
.udot{width:7px;height:7px;border-radius:50%;background:#E8593C;box-shadow:0 0 0 2px #FDEAE3}
.ti-labels{display:flex;gap:3px;flex-wrap:wrap;margin-top:2px}
.ti-label{font-size:9px;padding:1px 5px;border-radius:4px;font-weight:600}
.load-more{text-align:center;padding:10px;font-size:11px;color:#E8593C;cursor:pointer;font-weight:600}
.load-more:hover{text-decoration:underline}

/* AUTH */
.auth-zone{padding:10px 12px;border-top:1px solid #EBEBEB}
.auth-btn{width:100%;background:#E8593C;color:#fff;border:none;border-radius:8px;padding:8px;font-size:12px;font-weight:600;cursor:pointer}
.connected{font-size:11px;color:#34C68A;font-weight:600;display:flex;align-items:center;gap:6px}
.refresh-btn{background:none;border:1px solid #EBEBEB;color:#E8593C;border-radius:7px;padding:3px 9px;font-size:11px;font-weight:600;cursor:pointer}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.mh{padding:12px 20px;background:#fff;border-bottom:1px solid #EBEBEB;display:flex;justify-content:space-between;align-items:center;flex-shrink:0;gap:10px}
.mh-left{min-width:0;flex:1}
.mh-title{font-size:14px;font-weight:700;color:#1A1612;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mh-sub{font-size:10px;color:#8A8A8E;margin-top:2px}
.mh-actions{display:flex;gap:6px;flex-shrink:0}
.sum-btn{background:#FDEAE3;color:#E8593C;border:none;border-radius:8px;padding:6px 12px;font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap}
.label-btn{background:#F5F4F0;color:#444;border:none;border-radius:8px;padding:6px 12px;font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap}
.sum-box{margin:8px 20px 0;padding:10px 14px;background:#FDEAE3;border-radius:10px;font-size:11.5px;color:#8A4A36;line-height:1.65;position:relative;display:none;flex-shrink:0}
.sum-box.vis{display:block}
.sum-lbl{font-size:9px;color:#E8593C;text-transform:uppercase;letter-spacing:.5px;font-weight:600;margin-bottom:4px}
.sum-x{position:absolute;top:8px;right:12px;background:none;border:none;color:#8A8A8E;cursor:pointer;font-size:14px}
.msgs{flex:1;overflow-y:auto;padding:14px 20px;display:flex;flex-direction:column;gap:14px;min-width:0}
.bw{display:flex;flex-direction:column;width:100%}
.bw.mine{align-items:flex-end}
.bw.theirs{align-items:flex-start}
.srow{display:flex;align-items:center;gap:5px;margin-bottom:4px}
.mav{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;color:#fff;flex-shrink:0}
.sname{font-size:10.5px;color:#8A8A8E}
.bub{max-width:65%;padding:10px 14px;font-size:13px;line-height:1.6;word-break:break-word;white-space:pre-wrap}
.bub.mine{background:#E8593C;color:#FFF6F1;border-radius:16px 16px 4px 16px}
.bub.theirs{background:#1D9E75;color:#FFF6F1;border-radius:16px 16px 16px 4px}
.btime{font-size:10px;color:#ABABAB;margin-top:4px}
.rbar{padding:10px 20px 12px;background:#fff;border-top:1px solid #EBEBEB;flex-shrink:0}
.rrow{display:flex;gap:8px;align-items:flex-end}
.rinput{flex:1;resize:vertical;padding:11px 14px;border-radius:14px;border:1px solid #EBEBEB;background:#FFF6F1;font-size:13px;color:#1A1612;outline:none;min-height:90px;max-height:340px;line-height:1.55;font-family:inherit}
.send-btn{background:#E8593C;color:#fff;border:none;border-radius:11px;width:40px;height:40px;font-size:17px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.send-btn:disabled{opacity:.4;cursor:default}
.st{height:16px;margin-top:4px;font-size:11px}
.empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#8A8A8E;gap:8px}
.compose-wrap{flex:1;padding:20px;display:flex;flex-direction:column;gap:10px;overflow:auto}
.inp{width:100%;padding:10px 14px;border-radius:10px;border:1px solid #EBEBEB;background:#FFF6F1;font-size:13px;color:#1A1612;outline:none;font-family:inherit}
.loading{padding:30px;text-align:center;color:#8A8A8E;font-size:13px}

/* SEARCH RESULTS */
.search-info{padding:8px 12px;font-size:11px;color:#8A8A8E;border-bottom:1px solid #EBEBEB;background:#FFF6F1}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.3);display:flex;align-items:center;justify-content:center;z-index:100}
.modal{background:#fff;border-radius:14px;padding:20px;width:300px;box-shadow:0 8px 30px rgba(0,0,0,.15)}
.modal-title{font-size:15px;font-weight:700;color:#1A1612;margin-bottom:14px}
.modal-inp{width:100%;padding:9px 12px;border-radius:8px;border:1px solid #EBEBEB;font-size:13px;outline:none;font-family:inherit;margin-bottom:10px}
.color-row{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.color-dot{width:22px;height:22px;border-radius:50%;cursor:pointer;border:2px solid transparent}
.color-dot.sel{border-color:#1A1612}
.modal-btns{display:flex;gap:8px;justify-content:flex-end}
.modal-btn{padding:7px 16px;border-radius:8px;border:none;font-size:13px;font-weight:600;cursor:pointer}
</style>
</head>
<body>
<div class="app">
  <!-- SIDEBAR -->
  <div class="sb" id="sidebar">
    <div class="resize-handle" id="resizeHandle"><div class="resize-bar"></div></div>
    <div class="sb-top">
      <div class="sb-title">Ma Boîte Mail <button class="nbtn" id="newBtn">+ Nouveau</button></div>
      <div class="srch-wrap">
        <span class="srch-icon"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></span>
        <input class="srch" id="search" placeholder="Rechercher…">
        <button class="srch-clear" id="srchClear">×</button>
      </div>
    </div>

    <!-- FOLDERS -->
    <div class="folders" id="folders">
      <div class="folder on" data-folder="INBOX" onclick="switchFolder('INBOX',this)"><span class="folder-icon"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 16 12 14 15 10 15 8 12 2 12"/><path d="M5.45 5.11L2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"/></svg></span>Boîte de réception<span class="folder-count" id="cnt-INBOX">0</span></div>
      <div class="folder" data-folder="SENT" onclick="switchFolder('SENT',this)"><span class="folder-icon"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg></span>Envoyés</div>
      <div class="folder" data-folder="DRAFT" onclick="switchFolder('DRAFT',this)"><span class="folder-icon"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg></span>Brouillons</div>
      <div class="folder" data-folder="SPAM" onclick="switchFolder('SPAM',this)"><span class="folder-icon"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/></svg></span>Spam</div>
      <div class="folder" data-folder="TRASH" onclick="switchFolder('TRASH',this)"><span class="folder-icon"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg></span>Corbeille</div>
    </div>

    <!-- LABELS -->
    <div class="labels-section">
      <div class="labels-title">Étiquettes <button class="label-add" onclick="showAddLabel()" title="Nouvelle étiquette"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></button></div>
      <div id="labelsList"></div>
    </div>

    <div class="search-info" id="searchInfo" style="display:none"></div>
    <div class="bulk-bar" id="bulkBar">
      <span id="bulkCount">0 sélectionné(s)</span>
      <button class="bulk-btn" id="bulkDeleteBtn"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>Supprimer</button>
      <button class="bulk-cancel" id="bulkCancelBtn">Annuler</button>
    </div>
    <div class="tlist" id="tlist"><div class="loading">Connectez votre Gmail →</div></div>

    <div class="auth-zone">
      <button class="auth-btn" id="authBtn">🔗 Connecter mon Gmail</button>
      <div id="connectedZone" style="display:none">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <span class="connected">● Gmail connecté</span>
          <div style="display:flex;gap:6px">
            <button class="refresh-btn" id="refreshBtn">↻</button>
            <button class="refresh-btn" id="logoutBtn" title="Se déconnecter">⏻</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main" id="main">
    <div class="empty">
      <div style="font-size:38px">✉️</div>
      <div style="font-size:14px;font-weight:500">Sélectionnez une conversation</div>
      <div style="font-size:12px;margin-top:4px">Connectez votre Gmail pour accéder à vos emails</div>
    </div>
  </div>
</div>

<script>
const CLIENT_ID="503752573647-0mo2us3ukmg3dbnuvj9mc3db6bdlk029.apps.googleusercontent.com";
const SCOPES="https://www.googleapis.com/auth/gmail.modify https://www.googleapis.com/auth/gmail.send https://www.googleapis.com/auth/gmail.readonly";
const REDIRECT="https://0rakless.github.io/Ma-boite-mail/";

const COLORS=["#E07B6A","#E8593C","#34C68A","#F5A623","#C46BBF","#4FABD6","#7C6BDE","#56C4A8"];
const P=["#7C6BDE","#4FABD6","#56C4A8","#E07B6A","#C46BBF","#D4A843","#5D8EE0"];
const hue=n=>{let h=0;for(const c of n)h=(h*31+c.charCodeAt(0))%P.length;return P[h]};
const ini=n=>n.split(/\s+/).slice(0,2).map(w=>w[0]?.toUpperCase()||"").join("");
const tl=iso=>{if(!iso)return"";const d=new Date(iso),now=new Date(),s=(now-d)/1000;if(s<3600)return`${Math.floor(s/60)}m`;if(s<86400)return d.toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit"});if(s<604800)return d.toLocaleDateString("fr-FR",{weekday:"short"});return d.toLocaleDateString("fr-FR",{day:"2-digit",month:"short"})};
const tlFull=iso=>{if(!iso)return"";const d=new Date(iso);return d.toLocaleDateString("fr-FR",{day:"2-digit",month:"2-digit",year:"numeric"})+" à "+d.toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit"});};
const esc=s=>(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");

let token=null, threads=[], sel=null, allMsgs=[], nextPageToken=null, curFolder="INBOX";
let labels=JSON.parse(localStorage.getItem("mailLabels")||'[{"id":"unread","name":"Non lu","color":"#E8593C"},{"id":"urgent","name":"Urgent","color":"#E07B6A"}]');
let threadLabels=JSON.parse(localStorage.getItem("threadLabels")||'{}');
let searchMode=false, searchQuery="";

function saveToken(tok, expiresInSeconds){
  const expiresAt = Date.now() + (parseInt(expiresInSeconds||"3500",10) * 1000);
  localStorage.setItem("gmailToken", JSON.stringify({ token: tok, expiresAt }));
}
function loadSavedToken(){
  try{
    const raw = localStorage.getItem("gmailToken");
    if(!raw) return null;
    const data = JSON.parse(raw);
    if(!data.token || !data.expiresAt) return null;
    if(Date.now() >= data.expiresAt - 60000) { // expired or about to expire
      localStorage.removeItem("gmailToken");
      return null;
    }
    return data.token;
  }catch{ return null; }
}
function clearSavedToken(){ localStorage.removeItem("gmailToken"); }

// OAuth redirect (fresh login)
const hash=new URLSearchParams(window.location.hash.slice(1));
if(hash.get("access_token")){
  token=hash.get("access_token");
  saveToken(token, hash.get("expires_in"));
  window.history.replaceState({},document.title,window.location.pathname);
  showConnected();loadThreads();
} else {
  // Try to restore a previous session automatically
  const saved = loadSavedToken();
  if(saved){
    token = saved;
    showConnected();
    loadThreads();
  }
}

function showConnected(){
  document.getElementById("authBtn").style.display="none";
  document.getElementById("connectedZone").style.display="block";
}
document.getElementById("authBtn").onclick=()=>{
  const p=new URLSearchParams({client_id:CLIENT_ID,redirect_uri:REDIRECT,response_type:"token",scope:SCOPES,prompt:"consent"});
  window.location.href=`https://accounts.google.com/o/oauth2/v2/auth?${p}`;
};
document.getElementById("refreshBtn").onclick=()=>searchMode?doSearch(searchQuery):loadThreads(false);
document.getElementById("logoutBtn").onclick=()=>{
  clearSavedToken();
  token=null;
  threads=[]; sel=null; allMsgs=[];
  document.getElementById("authBtn").style.display="block";
  document.getElementById("connectedZone").style.display="none";
  document.getElementById("tlist").innerHTML='<div class="loading">Connectez votre Gmail →</div>';
  document.getElementById("main").innerHTML='<div class="empty"><div style="font-size:38px">✉️</div><div style="font-size:14px;font-weight:500">Sélectionnez une conversation</div></div>';
};
document.getElementById("newBtn").onclick=showCompose;

// Search
const searchEl=document.getElementById("search");
const clearBtn=document.getElementById("srchClear");
let searchTimer=null;
searchEl.oninput=e=>{
  const q=e.target.value.trim();
  clearBtn.style.display=q?"block":"none";
  clearTimeout(searchTimer);
  if(!q){exitSearch();return;}
  searchTimer=setTimeout(()=>doSearch(q),600);
};
clearBtn.onclick=()=>{searchEl.value="";clearBtn.style.display="none";exitSearch();};

async function doSearch(q){
  if(!token){filterLocal(q);return;}
  searchMode=true;searchQuery=q;
  threads=[];nextPageToken=null;
  document.getElementById("tlist").innerHTML='<div class="loading">Recherche en cours…</div>';
  document.getElementById("searchInfo").style.display="none";
  try{
    // Search across all folders
    const data=await gFetch(`threads?maxResults=50&q=${encodeURIComponent(q)}`);
    nextPageToken=data.nextPageToken||null;
    if(!data.threads||!data.threads.length){
      document.getElementById("tlist").innerHTML='<div class="loading">Aucun résultat</div>';
      document.getElementById("searchInfo").textContent=`Aucun email trouvé pour "${q}"`;
      document.getElementById("searchInfo").style.display="block";
      return;
    }
    await parseAndRenderThreads(data.threads);
    document.getElementById("searchInfo").textContent=`${threads.length} résultat(s) pour "${q}"${nextPageToken?" — scroll pour en voir plus":""}`;
    document.getElementById("searchInfo").style.display="block";
  }catch(e){document.getElementById("tlist").innerHTML='<div class="loading">Erreur de recherche</div>';}
}

function filterLocal(q){
  searchMode=false;
  renderList(q.toLowerCase());
}

function exitSearch(){
  searchMode=false;searchQuery="";
  document.getElementById("searchInfo").style.display="none";
  loadThreads(false);
}

async function switchFolder(folder, el){
  curFolder=folder;searchMode=false;searchQuery="";
  searchEl.value="";clearBtn.style.display="none";
  document.querySelectorAll(".folder").forEach(f=>f.classList.remove("on"));
  el.classList.add("on");
  document.getElementById("searchInfo").style.display="none";
  await loadThreads(false);
}

async function gFetch(path,opts={}){
  const r=await fetch(`https://gmail.googleapis.com/gmail/v1/users/me/${path}`,{...opts,headers:{Authorization:`Bearer ${token}`,"Content-Type":"application/json",...opts.headers}});
  if(r.status===401){
    clearSavedToken();
    token=null;
    document.getElementById("authBtn").style.display="block";
    document.getElementById("connectedZone").style.display="none";

function fileToBase64(file){
  return new Promise((resolve,reject)=>{
    const r=new FileReader();
    r.onload=()=>resolve(r.result.split(",")[1]);
    r.onerror=reject;
    r.readAsDataURL(file);
  });
}

async function makeRawWithAttachments({to,subject,body,replyToMessageId,files}){
  if(!files||!files.length){
    return makeRaw({to,subject,body,replyToMessageId});
  }
  const boundary="boundary_"+Date.now().toString(36);
  let lines=[
    `To: ${to}`,
    `Subject: =?utf-8?B?${btoa(unescape(encodeURIComponent(subject)))}?=`,
    "MIME-Version: 1.0",
  ];
  if(replyToMessageId)lines.push(`In-Reply-To: ${replyToMessageId}`,`References: ${replyToMessageId}`);
  lines.push(`Content-Type: multipart/mixed; boundary="${boundary}"`,"","--"+boundary,
    "Content-Type: text/plain; charset=utf-8","",body,"");
  for(const file of files){
    const b64=await fileToBase64(file);
    lines.push("--"+boundary,
      `Content-Type: ${file.type||"application/octet-stream"}; name="${file.name}"`,
      "Content-Transfer-Encoding: base64",
      `Content-Disposition: attachment; filename="${file.name}"`,
      "",
      b64.match(/.{1,76}/g).join("\r\n"),
      "");
  }
  lines.push("--"+boundary+"--");
  const raw=lines.join("\r\n");
  return btoa(unescape(encodeURIComponent(raw))).replace(/\+/g,"-").replace(/\//g,"_").replace(/=+$/,"");
}

function makeRaw({to,subject,body,replyToMessageId}){
  const lines=[`To: ${to}`,`Subject: =?utf-8?B?${btoa(unescape(encodeURIComponent(subject)))}?=`,"Content-Type: text/plain; charset=utf-8","MIME-Version: 1.0","",body];
  if(replyToMessageId)lines.splice(2,0,`In-Reply-To: ${replyToMessageId}`,`References: ${replyToMessageId}`);
  return btoa(unescape(encodeURIComponent(lines.join("\r\n")))).replace(/\+/g,"-").replace(/\//g,"_").replace(/=+$/,"");
}

const FOLDER_QUERIES={INBOX:"in:inbox",SENT:"in:sent",DRAFT:"in:drafts",SPAM:"in:spam",TRASH:"in:trash"};

async function loadThreads(append=false){
  if(!token)return;
  if(!append){threads=[];nextPageToken=null;document.getElementById("tlist").innerHTML='<div class="loading">Chargement…</div>';}
  try{
    const q=FOLDER_QUERIES[curFolder]||"in:inbox";
    let url=`threads?maxResults=50&q=${encodeURIComponent(q)}`;
    if(append&&nextPageToken)url+=`&pageToken=${nextPageToken}`;
    const data=await gFetch(url);
    nextPageToken=data.nextPageToken||null;
    if(!data.threads){document.getElementById("tlist").innerHTML='<div class="loading">Aucun email</div>';return;}
    await parseAndRenderThreads(data.threads);
    // Update unread count for inbox
    if(curFolder==="INBOX"){
      const cnt=threads.filter(t=>t.unread).length;
      document.getElementById("cnt-INBOX").textContent=cnt||"";
    }
  }catch(e){document.getElementById("tlist").innerHTML='<div class="loading">Erreur</div>';}
}

async function parseAndRenderThreads(rawThreads){
  const batches=[];
  for(let i=0;i<rawThreads.length;i+=10)batches.push(rawThreads.slice(i,i+10));
  for(const batch of batches){
    const details=await Promise.all(batch.map(t=>gFetch(`threads/${t.id}?format=METADATA&metadataHeaders=Subject&metadataHeaders=From&metadataHeaders=Date`)));
    const parsed=details.map(t=>{
      const first=t.messages?.[0],last=t.messages?.[t.messages.length-1];
      const get=(msg,n)=>(msg?.payload?.headers||[]).find(h=>h.name.toLowerCase()===n)?.value||"";
      const from=get(first,"from"),nm=from.match(/^(.+?)\s*</),em=from.match(/<(.+?)>/);
      return{id:t.id,threadId:t.id,name:nm?nm[1].replace(/"/g,"").trim():from,email:em?em[1]:from,
        subj:get(first,"subject")||"(sans objet)",snip:last?.snippet||"",
        time:new Date(parseInt(last?.internalDate||Date.now())).toISOString(),
        unread:(last?.labelIds||[]).includes("UNREAD"),lastId:last?.id};
    });
    threads=[...threads,...parsed];
    renderList();
  }
}

function renderList(q=""){

  }

  // Sort: unread first, then by date (most recent first) within each group
  visible=[...visible].sort((a,b)=>{

        // Remove remaining HTML tags
        txt=txt.replace(/<[^>]*>/g," ");
        // Decode HTML entities
        const el=document.createElement("div");el.innerHTML=txt;txt=el.textContent||el.innerText||"";
        // Remove embedded image references like [cid:image001.jpg@...]
        txt=txt.replace(/\[cid:[^\]]*\]/gi," ");
        // Remove "Pensez à l'environnement avant d'imprimer" type eco-footers
        txt=txt.replace(/Pensez\s+à\s+l['’]environnement\s+avant\s+d['’]imprimer\s+ce\s+message\.?/gi,"");
        // Remove quoted reply lines (lines starting with >)
        txt=txt.split("\n").filter(l=>!l.trim().startsWith(">")).join("\n");
        // Cut off at the start of a quoted email chain (French & English clients)
        const cutMarkers=[
          /Le\s.+?\s(?:a\s)?écrit\s*:/i,
          /On\s.+?\swrote\s*:/i,
          /-{2,}\s*Message\s+(?:transféré|original)\s*-{2,}/i,
          /-{2,}\s*Forwarded\s+message\s*-{2,}/i,
          /^De\s*:\s/im,
          /^From\s*:\s/im,
          /^Envoyé\s*:\s/im,
          /^Sent\s*:\s/im,
        ];
        let cutIdx=txt.length;
        for(const re of cutMarkers){
          const m=txt.match(re);
          if(m&&m.index<cutIdx)cutIdx=m.index;
        }
        txt=txt.slice(0,cutIdx);
        // Collapse multiple blank lines and excess whitespace
        txt=txt.replace(/[ \t]{2,}/g," ").replace(/\n{3,}/g,"\n\n").trim();
        return txt;
      }
      function getAttachments(p,out){
        out=out||[];
        if(!p)return out;
        if(p.filename&&p.filename.length>0&&p.body?.attachmentId){
          out.push({filename:p.filename,mimeType:p.mimeType||"application/octet-stream",attachmentId:p.body.attachmentId,size:p.body.size||0});
        }
        if(p.parts)for(const x of p.parts)getAttachments(x,out);
        return out;
      }
      return{messageId:msg.id,mine:isMe,name:nm?nm[1].replace(/"/g,"").trim():from,body:cleanBody(getBody(msg.payload)).slice(0,1000),t:new Date(parseInt(msg.internalDate||Date.now())).toISOString(),attachments:getAttachments(msg.payload)};
    });
    renderMsgs(c);
  }catch(e){document.getElementById("msgs").innerHTML='<div class="loading">Erreur</div>';}
}

function prettifyBody(txt){
  if(!txt)return txt;
  // Add a blank line after the greeting line (Bonjour X, / Bonsoir X,)
  txt=txt.replace(/^((?:Bonjour|Bonsoir|Salut|Cher|Chère|Madame|Monsieur)[^\n]{0,60},?)\n(?!\n)/i,"$1\n\n");
  // Add a blank line before common sign-off phrases if not already separated
  const signoffs=/(Bonne journée|Bonne soirée|Cordialement|Bien cordialement|Bien à vous|Bien à toi|Merci d'avance|Sincèrement|À bientôt)/i;
  txt=txt.replace(new RegExp("([^\\n])\\n("+signoffs.source+")","i"),"$1\n\n$2");
  txt=txt.replace(/\n{3,}/g,"\n\n");
  return txt.trim();
}

function fileIcon(mime,name){
  const ext=(name||"").split(".").pop().toLowerCase();
  if(mime?.startsWith("image/"))return `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>`;
  if(mime==="application/pdf"||ext==="pdf")return `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>`;
  return `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>`;
}
function fmtSize(b){if(!b)return"";if(b<1024)return b+" o";if(b<1048576)return Math.round(b/1024)+" Ko";return (b/1048576).toFixed(1)+" Mo";}

async function downloadAttachment(messageId,attachmentId,filename,mimeType){
  try{
    const data=await gFetch(`messages/${messageId}/attachments/${attachmentId}`);
    if(!data.data)return;
    const b64=data.data.replace(/-/g,"+").replace(/_/g,"/");
    const byteChars=atob(b64);
    const bytes=new Uint8Array(byteChars.length);
    for(let i=0;i<byteChars.length;i++)bytes[i]=byteChars.charCodeAt(i);
    const blob=new Blob([bytes],{type:mimeType});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    a.href=url;a.download=filename;document.body.appendChild(a);a.click();
    document.body.removeChild(a);
    setTimeout(()=>URL.revokeObjectURL(url),3000);
  }catch(e){alert("Erreur lors du téléchargement de la pièce jointe.");}
}

async function previewAttachment(messageId,attachmentId,filename,mimeType){
  try{
    const data=await gFetch(`messages/${messageId}/attachments/${attachmentId}`);
    if(!data.data)return;
    const b64=data.data.replace(/-/g,"+").replace(/_/g,"/");
    if(mimeType.startsWith("image/")||mimeType==="application/pdf"){
      const byteChars=atob(b64);
      const bytes=new Uint8Array(byteChars.length);
      for(let i=0;i<byteChars.length;i++)bytes[i]=byteChars.charCodeAt(i);
      const blob=new Blob([bytes],{type:mimeType});
      const url=URL.createObjectURL(blob);
      window.open(url,"_blank");
      setTimeout(()=>URL.revokeObjectURL(url),60000);
    }else{
      downloadAttachment(messageId,attachmentId,filename,mimeType);
    }
  }catch(e){alert("Erreur lors de l'ouverture de la pièce jointe.");}
}


function renderMsgs(c){
  const container=document.getElementById("msgs");if(!container)return;
  container.innerHTML="";
  allMsgs.forEach(m=>{
    const w=document.createElement("div");
    w.className="bw "+(m.mine?"mine":"theirs");
    if(!m.mine){const sr=document.createElement("div");sr.className="srow";sr.innerHTML=`<div class="mav" style="background:${c}">${ini(m.name)}</div><span class="sname">${esc(m.name)}</span>`;w.appendChild(sr);}
    const bub=document.createElement("div");bub.className="bub "+(m.mine?"mine":"theirs");bub.textContent=m.mine?prettifyBody(m.body):m.body;w.appendChild(bub);
    if(m.attachments&&m.attachments.length){
      const att=document.createElement("div");
      att.className="att-list";
      att.style.cssText="display:flex;flex-direction:column;gap:5px;margin-top:6px;max-width:65%";
      m.attachments.forEach(a=>{
        const row=document.createElement("div");
        row.style.cssText=`display:flex;align-items:center;gap:7px;background:${m.mine?'#C84B30':'#E8E8E8'};color:${m.mine?'#fff':'#1A1612'};border-radius:10px;padding:7px 10px;font-size:11px;cursor:pointer`;
        row.innerHTML=`${fileIcon(a.mimeType,a.filename)}<span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(a.filename)}</span><span style="opacity:.7;font-size:10px">${fmtSize(a.size)}</span>`;
        row.title="Cliquer pour ouvrir, Alt+clic pour télécharger";
        row.onclick=(ev)=>{
          if(ev.altKey)downloadAttachment(m.messageId,a.attachmentId,a.filename,a.mimeType);
          else previewAttachment(m.messageId,a.attachmentId,a.filename,a.mimeType);
        };
        att.appendChild(row);
      });
      w.appendChild(att);
    }
    const bt=document.createElement("div");bt.className="btime";bt.textContent=tlFull(m.t);w.appendChild(bt);
    container.appendChild(w);
  });
  container.scrollTop=9999;
}

async function sendReply(t){
  const inp=document.getElementById("ri"),val=inp.value.trim(),st=document.getElementById("st");
  const files=window._pendingFiles||[];
  if(!val&&!files.length)return;
  document.getElementById("sendBtn").disabled=true;st.innerHTML=files.length?"Envoi avec pièce(s) jointe(s)…":"";
  const last=allMsgs[allMsgs.length-1];
  try{
    const raw=await makeRawWithAttachments({to:t.email,subject:`Re: ${t.subj}`,body:val,replyToMessageId:last?.messageId,files});
    const payload={raw};if(t.threadId)payload.threadId=t.threadId;
    const res=await gFetch("messages/send",{method:"POST",body:JSON.stringify(payload)});
    if(res.id){
      st.innerHTML='<span style="color:#34C68A">✓ Envoyé !</span>';
      const attMeta=files.map(f=>({filename:f.name,mimeType:f.type,size:f.size}));
      allMsgs.push({mine:true,name:"Moi",body:val,t:new Date().toISOString(),attachments:[]});
      inp.value="";window._pendingFiles=[];renderAttachPreview();renderMsgs(hue(t.name));
      // Ensure thread doesn't get marked unread after replying
      t.unread=false;
      if(t.threadId) markThreadAsRead(t.threadId);
    }else st.innerHTML='<span style="color:#E05C5C">✗ Erreur</span>';
  }catch{st.innerHTML='<span style="color:#E05C5C">✗ Erreur réseau</span>';}
  document.getElementById("sendBtn").disabled=false;
}

// ── Save as draft ──
async function saveAsDraft(t){
  const inp=document.getElementById("ri")||document.getElementById("cBody");
  const body=inp.value.trim();
  const files=window._pendingFiles||[];
  if(!body&&!files.length)return;
  const st=document.getElementById("st")||document.getElementById("cSt");
  st.innerHTML="Enregistrement…";
  try{
    const to=t?t.email:document.getElementById("cTo")?.value.trim();
    const subj=t?`Re: ${t.subj}`:(document.getElementById("cSubj")?.value.trim()||"(sans objet)");
    const raw=await makeRawWithAttachments({to,subject:subj,body,files});
    const res=await gFetch("drafts",{method:"POST",body:JSON.stringify({message:{raw}})});
    if(res.id){
      st.innerHTML='<span style="color:#34C68A">✓ Brouillon enregistré</span>';
      setTimeout(()=>{if(st)st.innerHTML="";},2500);
    }else st.innerHTML='<span style="color:#E05C5C">✗ Erreur</span>';
  }catch(e){st.innerHTML='<span style="color:#E05C5C">✗ Erreur réseau</span>';}
}

// ── Schedule send ──
function toggleScheduleBox(t){
  const box=document.getElementById("scheduleBox");
  if(box.style.display==="block"){box.style.display="none";box.innerHTML="";return;}
  const now=new Date();
  now.setMinutes(now.getMinutes()+5);
  const dateStr=now.toISOString().slice(0,10);
  const timeStr=now.toTimeString().slice(0,5);
  box.style.display="block";
  box.innerHTML=`
    <div style="background:#FDEAE3;border-radius:10px;padding:10px 12px;display:flex;align-items:center;gap:8px;flex-wrap:wrap">
      <span style="font-size:11px;color:#E8593C;font-weight:600">Programmer l'envoi :</span>
      <input type="date" id="schedDate" value="${dateStr}" style="padding:5px 8px;border-radius:7px;border:1px solid #D8D6FA;font-size:12px;outline:none">
      <input type="time" id="schedTime" value="${timeStr}" style="padding:5px 8px;border-radius:7px;border:1px solid #D8D6FA;font-size:12px;outline:none">
      <button onclick="confirmSchedule(window._selThread)" style="background:#E8593C;color:#fff;border:none;border-radius:8px;padding:6px 14px;font-size:11px;font-weight:600;cursor:pointer">Programmer</button>
      <button onclick="document.getElementById('scheduleBox').style.display='none';document.getElementById('scheduleBox').innerHTML=''" style="background:none;border:none;color:#8A8A8E;font-size:11px;cursor:pointer">Annuler</button>
    </div>`;
}

function loadScheduled(){
  try{return JSON.parse(localStorage.getItem("scheduledEmails")||"[]");}catch{return[];}
}
function saveScheduled(list){localStorage.setItem("scheduledEmails",JSON.stringify(list));}

async function confirmSchedule(t){
  const inp=document.getElementById("ri")||document.getElementById("cBody");
  const body=inp.value.trim();
  if(!body){alert("Écrivez un message d'abord.");return;}
  const dateVal=document.getElementById("schedDate").value;
  const timeVal=document.getElementById("schedTime").value;
  if(!dateVal||!timeVal)return;
  const sendAt=new Date(`${dateVal}T${timeVal}:00`);
  if(sendAt.getTime()<=Date.now()){alert("Choisissez une date/heure dans le futur.");return;}

  const to=t?t.email:document.getElementById("cTo")?.value.trim();
  const subj=t?`Re: ${t.subj}`:(document.getElementById("cSubj")?.value.trim()||"(sans objet)");
  if(!to){alert("Destinataire manquant.");return;}

  const last=t&&allMsgs.length?allMsgs[allMsgs.length-1]:null;
  const list=loadScheduled();
  list.push({
    id:"sched_"+Date.now(),
    to,subject:subj,body,
    replyToMessageId:last?.messageId||null,
    threadId:t?t.threadId:null,
    sendAt:sendAt.toISOString(),
    sent:false
  });
  saveScheduled(list);

  const st=document.getElementById("st")||document.getElementById("cSt");
  st.innerHTML=`<span style="color:#34C68A">✓ Programmé pour le ${sendAt.toLocaleDateString("fr-FR")} à ${sendAt.toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit"})}</span>`;
  inp.value="";
  document.getElementById("scheduleBox").style.display="none";
  document.getElementById("scheduleBox").innerHTML="";
  checkScheduledEmails();
}

async function checkScheduledEmails(){
  if(!token)return;
  const list=loadScheduled();
  let changed=false;
  for(const item of list){
    if(item.sent)continue;
    if(new Date(item.sendAt).getTime()<=Date.now()){
      try{
        const raw=await makeRaw({to:item.to,subject:item.subject,body:item.body,replyToMessageId:item.replyToMessageId});
        const payload={raw};if(item.threadId)payload.threadId=item.threadId;
        const res=await gFetch("messages/send",{method:"POST",body:JSON.stringify(payload)});
        if(res.id){item.sent=true;changed=true;}
      }catch(e){}
    }
  }
  if(changed)saveScheduled(list);
}
setInterval(checkScheduledEmails,60000);

async function summarise(){
  const convo=allMsgs.map(m=>`${m.name}: ${m.body}`).join("\n\n");
  document.getElementById("sumTxt").textContent="Génération…";
  document.getElementById("sumBox").classList.add("vis");
  try{
    const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:300,system:"Résume en 2-3 phrases en français, de façon concise.",messages:[{role:"user",content:`Résume:\n\n${convo}`}]})});
    const d=await r.json();
    document.getElementById("sumTxt").textContent=d.content?.filter(b=>b.type==="text").map(b=>b.text).join("")||"Résumé indisponible.";
  }catch{document.getElementById("sumTxt").textContent="Résumé indisponible.";}
}

  window._selThread=null;

async function sendNew(){
  const to=document.getElementById("cTo").value.trim(),subj=document.getElementById("cSubj").value.trim()||"(sans objet)",body=document.getElementById("cBody").value.trim(),st=document.getElementById("cSt");
  if(!to||!body)return;
  st.textContent="Envoi…";
  try{
    const raw=makeRaw({to,subject:subj,body});
    const res=await gFetch("messages/send",{method:"POST",body:JSON.stringify({raw})});
    if(res.id){st.innerHTML='<span style="color:#34C68A">✓ Envoyé !</span>';document.getElementById("cBody").value="";}
    else st.innerHTML='<span style="color:#E05C5C">✗ Erreur</span>';
  }catch{st.innerHTML='<span style="color:#E05C5C">✗ Erreur réseau</span>';}
}
// ── Sidebar resize ──
const sidebar=document.getElementById("sidebar");
const handle=document.getElementById("resizeHandle");
let isResizing=false,startX=0,startW=0;
handle.addEventListener("mousedown",e=>{
  isResizing=true;startX=e.clientX;startW=sidebar.offsetWidth;
  handle.classList.add("dragging");
  document.body.style.cursor="col-resize";
  document.body.style.userSelect="none";
  e.preventDefault();
});
document.addEventListener("mousemove",e=>{
  if(!isResizing)return;
  const w=Math.min(460,Math.max(160,startW+(e.clientX-startX)));
  sidebar.style.width=w+"px";
});
document.addEventListener("mouseup",()=>{
  if(!isResizing)return;
  isResizing=false;
  handle.classList.remove("dragging");
  document.body.style.cursor="";
  document.body.style.userSelect="";
});
</script>
